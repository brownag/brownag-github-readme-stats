name: Generate GitHub Readme Stats

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday at midnight
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Main Stats Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=brownag&show_icons=true&theme=dark
          path: generated/github-readme-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=brownag&hide=html,less,css,scss,TeX,cypher&layout=compact&theme=dark
          path: generated/github-readme-stats-top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update generated github readme stats cards"
            git push
          fi
